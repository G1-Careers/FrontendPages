<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Redirecting...</title>
    <link rel="icon" href="assets/images/logos.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="assets/css/bootstrap.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f7fa;
        }
        .message-box {
            text-align: center;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 600px;
        }
        .message-box p {
            font-size: 18px;
            color: #666;
            margin: 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #7ED957;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="message-box">
        <div class="spinner"></div>
        <p>Redirecting to job details...</p>
    </div>

    <script>
        window.onload = function() {
            // Debug: Log window.location details
            console.log("window.location:", window.location);
            console.log("window.location.href:", window.location.href);
            console.log("window.location.search:", window.location.search);
            console.log("window.location.pathname:", window.location.pathname);
            console.log("window.location.protocol:", window.location.protocol);

            // Extract the 'ref' parameter
            let referenceId;
            try {
                const urlParams = new URLSearchParams(window.location.search);
                referenceId = urlParams.get('ref');
                console.log("URLSearchParams ref:", referenceId);
            } catch (e) {
                console.error("Error parsing URLSearchParams:", e);
            }

            // Fallback: Parse using new URL
            if (!referenceId) {
                try {
                    const url = new URL(window.location.href);
                    referenceId = url.searchParams.get('ref');
                    console.log("new URL ref:", referenceId);
                } catch (e) {
                    console.error("Error parsing new URL:", e);
                }
            }

            // Fallback: Manual query string parsing
            if (!referenceId && window.location.href.includes('ref=')) {
                const query = window.location.href.split('?')[1] || '';
                const params = query.split('&').reduce((acc, param) => {
                    const [key, value] = param.split('=');
                    acc[key] = value;
                    return acc;
                }, {});
                referenceId = params['ref'];
                console.log("Manual parsing ref:", referenceId);
            }

            if (!referenceId) {
                document.querySelector('.message-box p').textContent = "Error: No reference ID provided.";
                console.error("No reference ID found in URL.");
                return;
            }

            // Retrieve job data from sessionStorage
            const jobData = sessionStorage.getItem(referenceId);
            console.log("sessionStorage data for", referenceId, ":", jobData);

            if (!jobData) {
                document.querySelector('.message-box p').textContent = "Error: Job data not found or expired.";
                console.error("No job data found in sessionStorage for referenceId:", referenceId);
                return;
            }

            // Store job data in localStorage
            localStorage.setItem("selectedJob", jobData);

            // Construct redirect URL
            const redirectUrl = "file:///home/stranger/Desktop/G1Careers.com--FrontendPages/job-details.html";
            console.log("Redirecting to:", redirectUrl);

            // Perform redirect
            try {
                window.location.href = redirectUrl;
            } catch (e) {
                console.error("Redirect failed:", e);
                document.querySelector('.message-box p').textContent = "Error: Failed to redirect to job details. Please open file:///home/stranger/Desktop/G1Careers.com--FrontendPages/job-details.html manually.";
            }
        };
    </script>
</body>
</html>
