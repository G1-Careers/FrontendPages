    <style>
        /* Enhanced Contact Section Styling */
        .info-box {
            background: linear-gradient(135deg, #2c5234 0%, #1d3b24 100%);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            padding: 30px;
            transition: all 0.4s ease;
        }

        .info-box:hover {
            transform: translateY(-10px);
        }

        .info-box h3 {
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 600;
            position: relative;
            padding-bottom: 15px;
        }

        .info-box h3:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: #65e17f;
        }

        .icon-box {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            padding: 3px;
            height: 80px;
            width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .icon-box:hover {
            background-color: #65e17f;
            transform: translateY(-5px);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .icon-box img {
            animation: pulse 2s infinite;
        }

        .single-item {
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            background-color: rgba(0, 0, 0, 0.1);
        }

        .single-item:hover {
            background-color: rgba(0, 0, 0, 0.2);
            transform: translateY(-5px);
        }

        .single-item h4 {
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .single-item p,
        .single-item a {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .single-item a:hover {
            color: #65e17f;
            text-decoration: none;
        }

        /* Mobile Responsive Adjustments for Contact Section */
        @media (max-width: 991px) {
            .info-box {
                padding: 20px;
            }

            .info-box h3 {
                font-size: 28px;
                margin-bottom: 20px;
            }

            .single-item {
                margin-bottom: 20px;
                padding: 15px;
            }
        }

        @media (max-width: 767px) {
            .info-box .row {
                flex-direction: column;
            }

            .info-box .col-lg-4 {
                width: 100%;
                margin-bottom: 20px;
            }

            .single-item {
                text-align: center;
            }

            .icon-box {
                margin: 0 auto 15px;
            }

            .single-item h4 {
                font-size: 20px;
            }

            .single-item p,
            .single-item a {
                font-size: 14px;
            }
        }

        @media (max-width: 576px) {
            .info-box {
                padding: 15px;
            }

            .info-box h3 {
                font-size: 24px;
                margin-bottom: 15px;
            }

            .icon-box {
                height: 60px;
                width: 60px;
            }

            .single-item {
                padding: 10px;
            }

            .single-item h4 {
                font-size: 18px;
            }

            .single-item p,
            .single-item a {
                font-size: 13px;
            }
        }
    </style>
